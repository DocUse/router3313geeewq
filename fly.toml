app = "docuse-bitrix-router"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "prod"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8080"
  PORT = "8080"
  DB_PATH = "/data/bitrix_taxi_router.sqlite3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[mounts]
  source = "bitrix_router_data"
  destination = "/data"
